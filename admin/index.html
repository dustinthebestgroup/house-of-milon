<!doctype html>
<html>

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>Content Manager | House of Milon</title>
</head>

<!-- Custom Styling for CMS Login -->
<style>
    /* Apply Milon Red to the full background */
    body,
    div[data-app-id="nc-root"],
    .nc-login-container {
        background-color: #973f55 !important;
    }

    /* Hide the default Decap logo SVG and bottom footer */
    [class*="AppHeader-AppHeader-header-Logo-Logo-logo"] svg,
    .nc-appHeader-logo svg,
    [class*="Login-Login-logo"] svg,
    .nc-login-logo svg,
    a[href*="decapcms.org"],
    a[href*="netlifycms.org"] {
        display: none !important;
    }

    /* Inject House of Milon White Logo */
    [class*="AppHeader-AppHeader-header-Logo-Logo-logo"],
    .nc-appHeader-logo,
    [class*="Login-Login-logo"],
    .nc-login-logo {
        background-image: url('../assets/Milon%20Logo/Milon_BW-Logo-WHITE.png');
        background-repeat: no-repeat;
        background-position: center;
        background-size: contain;
        width: 250px !important;
        height: 80px !important;
        display: block !important;
        margin: 0 auto 30px auto !important;
    }

    /* Login Button Styling (Inverted for Red BG) */
    [class*="Login-Login-button"],
    .nc-login-button {
        background-color: #F4F0EB !important;
        color: #973f55 !important;
        border-radius: 4px !important;
        font-family: "Manrope", sans-serif !important;
        text-transform: uppercase;
        letter-spacing: 1px;
        font-weight: 600 !important;
    }

    [class*="Login-Login-button"]:hover,
    .nc-login-button:hover {
        background-color: #ffffff !important;
    }

    /* Rename "Collections" to "Settings" in Sidebar */
    aside h2,
    [class*="Sidebar-Sidebar-heading"] {
        font-size: 0 !important;
    }

    aside h2::after,
    [class*="Sidebar-Sidebar-heading"]::after {
        content: "Settings";
        font-size: 18px !important;
        font-family: inherit;
        color: inherit;
        visibility: visible;
    }

    /* Mobile Responsive Overrides for Decap CMS */
    @media (max-width: 768px) {

        /* Prevent horizontal scrollbar on the page */
        html,
        body {
            overflow-x: hidden !important;
        }

        /* ---- Sidebar: stack on top, scroll horizontally ---- */
        aside {
            width: 100% !important;
            height: auto !important;
            position: relative !important;
            padding: 12px 16px !important;
            border-right: none !important;
            border-bottom: 2px solid #e0e4e7 !important;
            box-sizing: border-box !important;
        }

        aside ul {
            display: flex !important;
            flex-direction: row !important;
            overflow-x: auto !important;
            -webkit-overflow-scrolling: touch !important;
            gap: 12px !important;
            padding: 6px 0 !important;
            margin: 0 !important;
            scrollbar-width: none !important;
        }

        aside ul::-webkit-scrollbar {
            display: none !important;
        }

        aside li {
            white-space: nowrap !important;
            margin: 0 !important;
        }

        /* Stack main layout (sidebar + content) vertically */
        main {
            flex-direction: column !important;
            overflow-x: hidden !important;
        }

        /* ---- Content area: full width ---- */
        main>div,
        main>section {
            width: 100% !important;
            box-sizing: border-box !important;
        }

        /* ---- Kill the SplitPane resizer and Preview Pane ONLY ---- */
        .Pane2,
        [class*="Pane2"],
        [class*="pane2"],
        [class*="preview-pane"],
        [class*="PreviewPane"],
        [class*="Editor-Editor-editorPreviewPane"],
        .Resizer,
        [class*="Resizer"] {
            display: none !important;
            width: 0 !important;
            min-width: 0 !important;
            visibility: hidden !important;
        }

        /* SplitPane wrapper: force it to render at full width, column stack */
        .SplitPane,
        [class*="SplitPane"] {
            position: relative !important;
            width: 100% !important;
            height: auto !important;
            flex-direction: column !important;
            display: flex !important;
        }

        /* Pane1 (editor fields): take full available width */
        .Pane1,
        [class*="Pane1"],
        [class*="pane1"],
        [class*="Editor-Editor-editorControlPane"] {
            width: 100% !important;
            max-width: 100vw !important;
            flex: 1 1 auto !important;
            height: auto !important;
            min-height: 100vh !important;
            overflow-y: auto !important;
        }

        /* ---- Toolbar ---- */
        header {
            height: auto !important;
            min-height: 52px !important;
            flex-wrap: wrap !important;
            padding: 8px 12px !important;
            box-sizing: border-box !important;
        }

        /* Shrink the "Writing in..." breadcrumb text  */
        header span {
            font-size: 11px !important;
            max-width: 45vw !important;
            overflow: hidden !important;
            text-overflow: ellipsis !important;
            white-space: nowrap !important;
        }

        /* Shrink Logo on Mobile */
        [class*="Logo"],
        .nc-appHeader-logo {
            width: 110px !important;
            height: 36px !important;
            margin: 0 !important;
        }
    }
</style>

<body>
    <!-- Include the script that builds the page and powers Decap CMS -->
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>

    <!-- Custom YouTube Embed Widget -->
    <script>
        var YouTubeControl = createClass({
            handleChange: function (e) {
                this.props.onChange(e.target.value);
            },

            render: function () {
                var value = this.props.value || '';
                return h('div', { className: this.props.classNameWrapper, style: { padding: '10px' } },
                    h('input', {
                        id: this.props.forID,
                        className: this.props.classNameWrapper,
                        type: 'text',
                        value: value,
                        onChange: this.handleChange,
                        style: { marginBottom: '16px', padding: '12px', width: '100%', border: '2px solid #dfdfe3', borderRadius: '5px' }
                    }),
                    value ? h('iframe', {
                        src: value,
                        style: { width: '100%', aspectRatio: '16/9', border: '0', borderRadius: '8px', boxShadow: '0 4px 6px rgba(0,0,0,0.1)' },
                        allow: "autoplay; encrypted-media",
                        allowFullScreen: true
                    }) : h('div', { style: { padding: '20px', textAlign: 'center', background: '#f4f4f4', borderRadius: '8px', color: '#666' } }, 'Enter a YouTube embed URL to see preview.')
                );
            }
        });

        var YouTubePreview = createClass({
            render: function () {
                return h('div', {}, this.props.value);
            }
        });

        CMS.registerWidget('youtube', YouTubeControl, YouTubePreview);
    </script>
</body>

</html>
